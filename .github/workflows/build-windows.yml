# Build WorkBOM Windows installer (NSIS).
# Public repo + standard windows-latest runners = free.
#
# Manual run:
#   GitHub → Actions → "Build Windows" → Run workflow → download artifact
#
# Tag run (optional):
#   git tag v0.1.93 && git push origin v0.1.93
#   → creates a draft GitHub Release with the .exe attached

name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        # @tremor/react peers React 18; project uses React 19 (see .npmrc).
        run: npm ci

      - name: Build (NSIS installer)
        run: npm run tauri -- build --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: WorkBOM-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: src-tauri/target/release/bundle/nsis/*.exe
          body: |
            Windows x64 installer (NSIS).

            Unsigned builds may trigger Windows SmartScreen — choose More info → Run anyway.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
